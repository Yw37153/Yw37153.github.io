title: 文逸行
subtitle: 心怀云水之洒脱
description: 认真生活中
keywords: null
author: Felix
language: zh-CN
timezone: ''
url: http://example.com
permalink: ':title/'
permalink_defaults: null
pretty_urls:
  trailing_index: true
  trailing_html: true

#索引
source_dir: source
public_dir: public
tag_dir: tag
archive_dir: archives
category_dir: categories
tag_generator:
  per_page: 10
  order_by: -date
  enable_index: true
code_dir: downloads/code
i18n_dir: ':lang'

#标签别名
category_map:
  教程: Tutorial
tag_map:
  教程: Tutorial
  Hexo: Hexo

skip_render: null
new_post_name: ':title.md'
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: true
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''
index_generator:
  path: ''
  per_page: 10
  order_by: date
default_category: uncategorized
meta_generator: true
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: mtime
per_page: 10
pagination_dir: page
include: null
exclude: null
ignore: null


#主题
theme: sea


deploy:
  type: git
  repo: git@github.com:Yw37153/Yw37153.github.io.git
  branch: main


#插件配置

# Security
encrypt: # hexo-blog-encrypt
  abstract: 这里有锁.
  message: 输入密码查看.
  tags:
  - {name: 日记, password: private_emo}
  - {name: 加密, password: Bog11025}
  theme: shrink
  wrong_pass_message: 你看不了哦~
  wrong_hash_message: 抱歉, 这个文章不能被校验, 不过您还是能看看解密后的内容.

#Markdown
markdown: #hexo-renderer-markdown-it
  preset: "default"
  render:
    html: true
    xhtmlOut: false
    langPrefix: "language-"
    breaks: true
    linkify: true
    typographer: true
    quotes: "“”‘’"
  enable_rules:
  disable_rules:
  plugins:
    - markdown-it-abbr
    - markdown-it-cjk-breaks
    - markdown-it-deflist
    - markdown-it-emoji
    - markdown-it-footnote
    - markdown-it-ins
    - markdown-it-mark
    - markdown-it-sub
    - markdown-it-sup
    - markdown-it-checkbox
    - markdown-it-imsize
    - markdown-it-expandable
    - name: markdown-it-container
      options: success
    - name: markdown-it-container
      options: tips
    - name: markdown-it-container
      options: warning
    - name: markdown-it-container
      options: danger
  anchors:
    level: 2
    collisionSuffix: ""
    permalink: false
    permalinkClass: "header-anchor"
    permalinkSide: "left"
    permalinkSymbol: "¶"
    case: 0
    separator: "-"
# mermaid chart
mermaid: ## mermaid url https://github.com/knsv/mermaid
  enable: true  # default true
  version: "7.1.2" # default v7.1.2
  options:  # find more api options from https://github.com/knsv/mermaid/blob/master/src/mermaidAPI.js
    #startOnload: true  // default true